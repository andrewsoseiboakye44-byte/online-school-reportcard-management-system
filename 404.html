<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | SERGIO ACADEMY</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #CE1126;
            --primary-gold: #F5B81B;
            --primary-green: #006B3F;
            --dark-bg: #1a1a1a;
            --light-bg: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, rgba(206,17,38,0.03) 0%, rgba(0,107,63,0.03) 100%), #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Shapes */
        .shape-1 {
            position: absolute;
            top: -10%;
            left: -5%;
            width: 50vw;
            height: 50vw;
            border-radius: 40%;
            background: linear-gradient(135deg, var(--primary-green), transparent);
            opacity: 0.05;
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        .shape-2 {
            position: absolute;
            bottom: -10%;
            right: -5%;
            width: 40vw;
            height: 40vw;
            border-radius: 40%;
            background: linear-gradient(135deg, #10b981, transparent);
            opacity: 0.05;
            animation: rotate 20s linear infinite reverse;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }

        .error-code {
            font-size: 150px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary-green), #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 10px 10px 30px rgba(0,0,0,0.05);
        }

        .btn-custom {
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary-custom {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
            color: white;
        }
        
        .btn-primary-custom:hover {
            background-color: #0a5231;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,107,63,0.2);
            color: white;
        }

        .btn-outline-custom {
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            background: transparent;
        }

        .btn-outline-custom:hover {
            background: var(--primary-green);
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="error-card fade-in">
                    <!-- Icon -->
                    <div class="mb-4">
                        <i class="fas fa-compass fa-4x text-dark opacity-25"></i>
                    </div>

                    <!-- 404 Text -->
                    <div class="error-code">404</div>
                    
                    <h2 class="fw-bold mb-3">Oops! You seem to be lost.</h2>
                    <p class="text-dark lead mb-5">
                        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
                    </p>

                    <!-- Action Buttons -->
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="index.html" class="btn btn-custom btn-primary-custom">
                            <i class="fas fa-home me-2"></i> Go Home
                        </a>
                        <a href="login.html" class="btn btn-custom btn-outline-custom">
                            <i class="fas fa-arrow-left me-2"></i> Back to Login
                        </a>
                    </div>
                </div>
                
                <div class="text-center mt-5 text-dark small" style="opacity: 1;">
                    Powered by StackWeb Developers
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
</body>
</html>
