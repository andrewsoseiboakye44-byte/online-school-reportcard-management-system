<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SERGIO ACADEMY</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/bg-slider.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
        
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        :root {
            --primary-red: #CE1126;
            --primary-gold: #F5B81B;
            --primary-green: #006B3F;
            --dark-bg: #1A2A3A;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-green) 0%, #0a5231 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-green), #0a5231);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .login-header i {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            margin: 0;
        }

        .login-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark-bg);
            display: block;
        }

        .input-group {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(0, 107, 63, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #475569;
        }

        .form-control {
            border: none;
            padding: 12px 0;
            font-size: 16px;
        }

        .form-control:focus {
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-green), #0a5231);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 107, 63, 0.3);
        }

        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .role-btn.active {
            background: linear-gradient(135deg, var(--primary-green), #0a5231);
            color: white;
        }

        .forgot-link {
            text-align: right;
            margin-top: 10px;
        }

        .forgot-link a {
            color: var(--primary-green);
            text-decoration: none;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .alert {
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .school-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            margin-top: 15px;
        }

        .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.25rem rgba(0, 107, 63, 0.25);
        }
    </style>
</head>

<body class="bg-slider-target">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-graduation-cap"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
                <div class="school-badge">
                    <i class="fas fa-check-circle"></i> SERGIO ACADEMY
                </div>
            </div>
            <div class="login-body">
                <div class="role-buttons">
                    <button class="role-btn active" onclick="setRole('admin')">
                        <i class="fas fa-user-shield"></i> Admin
                    </button>
                    <button class="role-btn" onclick="setRole('teacher')">
                        <i class="fas fa-chalkboard-user"></i> Teacher
                    </button>
                </div>

                <div id="alertMessage"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user-circle me-2"></i>Phone Number or Admin Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="email" placeholder="e.g. 0551234567 or admin@school" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock me-2"></i>Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password"
                                required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-link">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <div class="register-link">
                    <p class="text-dark mb-0">Don't have an account? <a href="#"
                            style="color: var(--primary-green);">Contact Administrator</a></p>
                </div>

                <div class="text-center mt-3">
                    <small class="text-dark">
                        <i class="fas fa-shield-alt"></i> Secure login with 256-bit encryption
                    </small>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 text-white  small fade-in" style="margin-bottom: -15px;">
            Powered by StackWeb Developers
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    
    <script>
        let selectedRole = 'admin';

        function setRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        AOS.init({
            duration: 1000,
            once: true
        });

        const togglePassword = document.querySelector('.toggle-password');
        const passwordInput = document.querySelector('#password');

        if (togglePassword) { // Check if the element exists before adding event listener
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }

        function showAlert(message, type = 'danger') {
            const alertDiv = document.getElementById('alertMessage');
            if (alertDiv) {
                alertDiv.innerHTML = `
                    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                        ${message}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    const alert = document.querySelector('.alert');
                    if (alert) alert.remove();
                }, 5000);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let inputIdentifier = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            if (!inputIdentifier || !password) {
                showAlert('Please fill in all fields', 'warning');
                return;
            }
            
            // Reconstruct dummy email if they entered just a username
            if (!inputIdentifier.includes('@')) {
                inputIdentifier = `${inputIdentifier.replace(/\s+/g, '')}@sergioacademy.com`;
            }
            
            // Show loading state
            const loginBtn = e.target.querySelector('button[type="submit"]');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            loginBtn.disabled = true;
            
            try {
                // Execute actual Supabase Auth login
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: inputIdentifier,
                    password: password,
                });
                
                if (error) throw error;
                
                // Lookup strict user role from custom public.users table (admin vs class_teacher vs subject_teacher)
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('role')
                    .eq('id', data.user.id)
                    .maybeSingle();
                    
                if (userError) throw userError;
                
                if (!userData) {
                    throw new Error("Your account was authenticated, but no user profile was found in the system. Please click 'Contact Administrator' or use the setup page to repair this account.");
                }
                
                // Save session role locally and redirect to the operational dashboard
                localStorage.setItem('userRole', userData.role);
                showAlert('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                showAlert(error.message === 'Invalid login credentials' ? 'Invalid Email or Password' : error.message, 'danger');
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        });
    </script>
    <script src="js/bg-slider.js"></script>
</body>
</html>
