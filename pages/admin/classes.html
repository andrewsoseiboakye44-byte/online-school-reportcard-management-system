<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <div class="table-search" style="width: 300px;">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-dark"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" placeholder="Search classes...">
            </div>
        </div>
        <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addClassModal">
            <i class="fas fa-plus me-2"></i> Add New Class
        </button>
    </div>
</div>

<div class="row" id="classesContainer">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-success" role="status" style="color: var(--primary-green) !important;"></div>
        <p class="mt-2 text-dark">Loading your classes securely...</p>
    </div>
</div>

<!-- Add Class Modal -->
<div class="modal fade modal-custom" id="addClassModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title m-0"><i class="fas fa-chalkboard me-2"></i> Create New Class</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body modal-body-custom">
                <form id="addClassForm">
                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Department *</label>
                        <select id="classDepartmentInput" class="form-control form-control-custom select-custom" required>
                            <option value="">Select Department</option>
                            <option value="jhs">Junior High School</option>
                            <option value="upper_primary">Upper Primary</option>
                            <option value="lower_primary">Lower Primary</option>
                            <option value="preschool">Preschool</option>
                        </select>
                    </div>

                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Class Name *</label>
                        <input type="text" id="classNameInput" class="form-control form-control-custom" placeholder="e.g. JHS 1A" required>
                    </div>

                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Assign Form Master</label>
                        <select id="formMasterInput" class="form-control form-control-custom select-custom">
                            <option value="">Select Teacher (Optional)</option>
                            <!-- Dynamic Injection via Javascript -->
                        </select>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom">Maximum Capacity *</label>
                        <input type="number" id="classCapacityInput" class="form-control form-control-custom" value="50" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer modal-footer-custom">
                <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addClassForm" class="btn btn-primary-custom">Save Class</button>
            </div>
        </div>
    </div>
</div>

<!-- View Class Roster Modal -->
<div class="modal fade modal-custom" id="viewRosterModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title m-0"><i class="fas fa-users me-2"></i> Class Roster: <span id="rosterClassName" class="text-primary-custom" style="font-weight: 700;">...</span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body modal-body-custom">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Student ID / PWD</th>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="rosterTableBody">
                            <tr><td colspan="5" class="text-center py-4">Loading students...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer modal-footer-custom justify-content-between">
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-success btn-sm fw-bold" onclick="exportClassRoster()">
                        <i class="fas fa-file-csv me-1"></i> Export CSV
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-sm fw-bold" onclick="printClassRoster()">
                        <i class="fas fa-print me-1"></i> Print List
                    </button>
                </div>
                <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Class Modal -->
<div class="modal fade modal-custom" id="editClassModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title m-0"><i class="fas fa-edit me-2"></i> Edit Class Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body modal-body-custom">
                <form id="editClassForm">
                    <input type="hidden" id="editClassIdDisplay">
                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Department *</label>
                        <select id="editClassDepartmentInput" class="form-control form-control-custom select-custom" required>
                            <option value="">Select Department</option>
                            <option value="jhs">Junior High School</option>
                            <option value="upper_primary">Upper Primary</option>
                            <option value="lower_primary">Lower Primary</option>
                            <option value="preschool">Preschool</option>
                        </select>
                    </div>

                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Class Name *</label>
                        <input type="text" id="editClassNameInput" class="form-control form-control-custom" placeholder="e.g. JHS 1A" required>
                    </div>

                    <div class="form-group-custom mb-3">
                        <label class="form-label-custom">Assign Form Master</label>
                        <select id="editFormMasterInput" class="form-control form-control-custom select-custom">
                            <option value="">Select Teacher (Optional)</option>
                            <!-- Dynamic Injection via Javascript -->
                        </select>
                    </div>

                    <div class="form-group-custom">
                        <label class="form-label-custom">Maximum Capacity *</label>
                        <input type="number" id="editClassCapacityInput" class="form-control form-control-custom" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer modal-footer-custom">
                <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="editClassForm" class="btn btn-primary-custom">Update Class</button>
            </div>
        </div>
    </div>
</div>
