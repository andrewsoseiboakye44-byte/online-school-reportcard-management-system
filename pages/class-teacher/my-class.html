<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <div class="table-search" style="width: 300px;">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-dark"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" placeholder="Search my students...">
            </div>
        </div>
        <button class="btn btn-outline-primary">
            <i class="fas fa-print me-2"></i> Print Class List
        </button>
    </div>
</div>

<div class="data-table">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0" id="myClassTitle">Class Roster</h5>
            <small class="text-dark" id="myClassSubtitle">Loading class details...</small>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th class="d-none d-md-table-cell">Student ID</th>
                    <th>Student Name</th>
                    <th class="d-none d-md-table-cell">Gender</th>
                    <th class="d-none d-md-table-cell">Date of Birth</th>
                    <th>Parent/Guardian Contact</th>
                    <th>Profile</th>
                </tr>
            </thead>
            <tbody id="myClassTbody">
                <tr>
                    <td colspan="6" class="text-center py-5">
                        <div class="spinner-border text-primary-green" role="status"></div>
                        <p class="mt-2 mb-0">Loading class roster...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Load Page Logic handled by grading.js initModule -->
