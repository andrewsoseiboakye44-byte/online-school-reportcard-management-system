<div class="row mb-4">
    <div class="col-md-12">
        <div class="card bg-light border-0 shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="text-primary-green mb-1"><i class="fas fa-calendar-check me-2"></i> Terminal Attendance Sheet</h5>
                    <p class="text-muted mb-0" id="attendanceTermLabel">Loading Active Term...</p>
                </div>
                <div class="text-end">
                    <h3 class="mb-0 text-dark fw-bold" id="totalAdminDays">--</h3>
                    <small class="text-muted">Total Expected Attendances</small>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-header bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 fw-bold">Student Roster</h6>
        <button class="btn btn-sm btn-outline-primary" id="btnFillMaxAttendance"><i class="fas fa-magic me-1"></i> Fill Perfect Attendance</button>
    </div>
    <div class="table-responsive p-0">
        <table class="table table-hover align-middle mb-0" id="attendanceSpreadsheet">
            <thead class="bg-light">
                <tr>
                    <th class="ps-3" style="width: 15%">Student ID</th>
                    <th style="width: 40%">Student Name</th>
                    <th class="text-center" style="width: 20%">Days Present</th>
                    <th class="text-center" style="width: 25%">Attendance %</th>
                </tr>
            </thead>
            <tbody id="attendanceTbody">
                <tr>
                    <td colspan="4" class="text-center py-5">
                        <div class="spinner-border text-primary-green" role="status"></div>
                        <p class="mt-2 mb-0">Loading class roster and attendance data...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="card-footer bg-white p-3 text-end">
        <button class="btn btn-primary-custom" id="btnSaveAttendance" disabled>
            <i class="fas fa-save me-2"></i> Save Terminal Attendance
        </button>
    </div>
</div>

<!-- Include logic -->
<script src="js/teacher/class-teacher/attendance.js"></script>
