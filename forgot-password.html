<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SERGIO ACADEMY</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-red: #CE1126;
            --primary-gold: #F5B81B;
            --primary-green: #006B3F;
            --dark-bg: #1a1a1a;
            --light-bg: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, rgba(206,17,38,0.05) 0%, rgba(0,107,63,0.05) 100%), #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Abstract Background Shapes */
        .shape-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-green), #10b981);
            opacity: 0.1;
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }

        .shape-2 {
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-green), #10b981);
            opacity: 0.1;
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            z-index: 10;
            position: relative;
        }

        .brand-header {
            background: linear-gradient(135deg, var(--primary-green), #0a5231);
            padding: 40px 20px;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--primary-gold);
        }

        .school-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .school-logo i {
            font-size: 40px;
            color: var(--primary-green);
        }

        .btn-custom {
            background: linear-gradient(135deg, var(--primary-green), #0a5231);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,107,63,0.3);
            color: white;
        }

        .back-link {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #0a5231;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="login-card fade-in">
                    <!-- Header -->
                    <div class="brand-header">
                        <div class="school-logo">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <h3 class="fw-bold mb-1">SERGIO ACADEMY</h3>
                        <p class="mb-0  small">Secure Password Recovery</p>
                    </div>

                    <!-- Form Area -->
                    <div class="p-4 p-md-5">
                        <div id="alertMessage"></div>

                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="fas fa-lock fa-3x text-dark opacity-50"></i>
                            </div>
                            <h4 class="fw-bold">Forgot Password?</h4>
                            <p class="text-dark small">No worries! Enter your registered staff email and we will send you a secure link to reset your password.</p>
                        </div>

                        <form id="resetForm">
                            <!-- Email Input -->
                            <div class="mb-4">
                                <label class="form-label text-dark small fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-envelope text-dark"></i>
                                    </span>
                                    <input type="email" class="form-control bg-light border-start-0" id="resetEmail" required placeholder="Enter your staff email">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-custom w-100 mb-4" id="resetBtn">
                                Send Reset Link <i class="fas fa-paper-plane ms-2"></i>
                            </button>

                            <div class="text-center">
                                <a href="login.html" class="back-link">
                                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Footer branding -->
                <div class="text-center mt-4 text-dark small fade-in" style="opacity: 1;">
                    Powered by StackWeb Developers
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const btn = document.getElementById('resetBtn');
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                showAlert('Please enter your email address.', 'danger');
                return;
            }

            // Loading state
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
            btn.disabled = true;

            try {
                // Call Supabase to send a password reset code
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) {
                    throw error;
                }

                showAlert(`Success! We've sent password reset instructions to <strong>${email}</strong>.`, 'success');
                this.reset();
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'danger');
            } finally {
                btn.innerHTML = 'Send Reset Link <i class="fas fa-paper-plane ms-2"></i>';
                btn.disabled = false;
            }
        });
    </script>
    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
</body>
</html>
